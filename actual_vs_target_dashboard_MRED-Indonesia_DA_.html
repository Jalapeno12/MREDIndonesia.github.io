<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actual vs Target Dashboard</title>

<!-- CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body { background:#f1f5f9 }
.card { background:white; border-radius:14px; padding:20px }
.kpi-card { cursor:pointer }
.kpi-active { outline:3px solid #000 }
</style>
</head>

<body class="p-6">



<div class="max-w-7xl mx-auto space-y-6">

<h1 class="text-3xl font-bold text-center">Actual vs Target Performance</h1>

<!-- UPLOAD -->
<div class="card text-center">
  <input id="upload" type="file" accept=".xlsx,.xls" class="hidden">
  <button onclick="upload.click()" class="bg-blue-600 text-white px-4 py-2 rounded">
    Upload Excel
  </button>
  <p id="fileName" class="text-gray-600 text-sm mt-2"></p>
</div>

<!-- FILTER -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
  <div>
    <label class="font-semibold">Year</label>
    <select id="filterYear" disabled class="border p-2 w-full rounded">
      <option value="Y1">Y1</option>
      <option value="Y2">Y2</option>
      <option value="Y3">Y3</option>
    </select>
  </div>
  <div>
    <label class="font-semibold">Activity</label>
    <select id="activitySelect" disabled class="border p-2 w-full rounded">
      <option value="ALL">All</option>
    </select>
  </div>
</div>

<!-- KPI -->
<div class="grid grid-cols-3 gap-4 text-center">
  <div id="kpiGREEN" onclick="setKpiFilter('GREEN')" class="kpi-card bg-green-100 p-4 rounded-xl">
    <p class="text-sm">≥100%</p>
    <p id="kpiGreen" class="text-2xl font-bold">0</p>
  </div>
  <div id="kpiYELLOW" onclick="setKpiFilter('YELLOW')" class="kpi-card bg-yellow-100 p-4 rounded-xl">
    <p class="text-sm">80–99%</p>
    <p id="kpiYellow" class="text-2xl font-bold">0</p>
  </div>
  <div id="kpiRED" onclick="setKpiFilter('RED')" class="kpi-card bg-red-100 p-4 rounded-xl">
    <p class="text-sm">&lt;80%</p>
    <p id="kpiRed" class="text-2xl font-bold">0</p>
  </div>
</div>

<!-- CHART -->
<div class="card">
  <canvas id="chartMain"></canvas>
</div>

<!-- NARRATIVE CONCLUSION -->
<div class="card">
  <h2 class="text-xl font-bold mb-3">Narrative Conclusion</h2>
  <p id="narrativeConclusion" class="text-gray-700 leading-relaxed"></p>
</div>

<!-- PRIORITY RED -->
<div class="card">
  <h2 class="text-xl font-bold mb-3 text-red-600">
    Priority Actions – Red Performance (&lt;80%)
  </h2>
  <div id="redList" class="space-y-3"></div>
  <p id="noRed" class="text-gray-500 italic hidden">
    Tidak terdapat aktivitas dengan performa di bawah 80%.
  </p>
</div>

</div>

<script>
let fullData=[], chart, kpiFilter="ALL"

/* LOGIN */
function checkLogin(){
  if(username.value==="MREDIII" && password.value==="jayajayajaya"){
    loginOverlay.style.display="none"
  } else loginError.classList.remove("hidden")
}

/* UPLOAD */
upload.addEventListener("change",e=>{
  const f=e.target.files[0]
  fileName.textContent=f.name
  const r=new FileReader()
  r.onload=()=>{
    const wb=XLSX.read(r.result,{type:"array"})
    fullData=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]])
    populateActivities()
    filterYear.disabled=false
    activitySelect.disabled=false
    updateDashboard()
  }
  r.readAsArrayBuffer(f)
})

filterYear.addEventListener("change",resetKpi)
activitySelect.addEventListener("change",resetKpi)

function populateActivities(){
  const acts=[...new Set(fullData.map(r=>r.Activity))]
  activitySelect.innerHTML='<option value="ALL">All</option>'
  acts.forEach(a=>{
    const o=document.createElement("option")
    o.value=o.text=a
    activitySelect.add(o)
  })
}

function setKpiFilter(t){
  kpiFilter=(kpiFilter===t)?"ALL":t
  updateDashboard()
}

function resetKpi(){ kpiFilter="ALL"; updateDashboard() }

/* KPI */
function calculateKPI(year){
  let g=0,y=0,r=0,map={}
  fullData.forEach(row=>{
    if(activitySelect.value!=="ALL" && row.Activity!==activitySelect.value)return
    let v=parseFloat(row[year]); if(isNaN(v))return
    if(v>0&&v<=1)v*=100
    if(!map[row.Activity])map[row.Activity]={A:0,T:0}
    if(row.Type==="Actual")map[row.Activity].A=v
    if(row.Type==="Target")map[row.Activity].T=v
  })
  Object.values(map).forEach(i=>{
    if(i.T>0){
      const p=i.A/i.T*100
      if(p>=100)g++; else if(p>=80)y++; else r++
    }
  })
  kpiGreen.textContent=g; kpiYellow.textContent=y; kpiRed.textContent=r
}

/* CHART */
function drawChart(year){
  const map={}
  fullData.forEach(row=>{
    if(activitySelect.value!=="ALL" && row.Activity!==activitySelect.value)return
    let v=parseFloat(row[year]); if(isNaN(v))return
    if(v>0&&v<=1)v*=100
    if(!map[row.Activity])map[row.Activity]={A:0,T:0}
    if(row.Type==="Actual")map[row.Activity].A=v
    if(row.Type==="Target")map[row.Activity].T=v
  })

  const labels=[],actual=[],target=[]
  Object.entries(map).forEach(([a,v])=>{
    if(v.T<=0)return
    const p=v.A/v.T*100
    if(kpiFilter==="GREEN"&&p<100)return
    if(kpiFilter==="YELLOW"&&(p<80||p>=100))return
    if(kpiFilter==="RED"&&p>=80)return
    labels.push(a); actual.push(v.A); target.push(v.T)
  })

  chart?.destroy()
  chart=new Chart(chartMain,{
    type:"bar",
    data:{labels,datasets:[
      {label:"Target",data:target,backgroundColor:"#fca5a5"},
      {label:"Actual",data:actual,
       backgroundColor:actual.map((a,i)=>{
        const p=a/target[i]*100
        return p>=100?"#22c55e":p>=80?"#facc15":"#ef4444"
       })}
    ]},
    options:{
      plugins:{title:{display:true,text:`${year} Performance`},
        datalabels:{formatter:(v,i)=>{
          const t=target[i.dataIndex]; return t>0?Math.round(v/t*100)+"%":""
        },anchor:"end",align:"top",font:{size:10}}
      },scales:{y:{beginAtZero:true}}
    },
    plugins:[ChartDataLabels]
  })
}

/* NARRATIVE */
function updateNarrative(year){
  const g=+kpiGreen.textContent,y=+kpiYellow.textContent,r=+kpiRed.textContent
  narrativeConclusion.innerHTML=`
  Berdasarkan hasil analisis kinerja Tahun <strong>${year}</strong>, secara umum capaian program menunjukkan performansi yang 
  <strong>${g>r?"baik":"perlu penguatan"}</strong>. 
  Sebanyak <strong>${g}</strong> aktivitas telah mencapai atau melampaui target, 
  <strong>${y}</strong> aktivitas hampir mencapai target, dan 
  <strong>${r}</strong> aktivitas berada di bawah 80% sehingga menjadi prioritas tindak lanjut.`
}

/* RED PRIORITY */
function updateRed(year){
  const map={},list=[]
  fullData.forEach(row=>{
    let v=parseFloat(row[year]); if(isNaN(v))return
    if(v>0&&v<=1)v*=100
    if(!map[row.Activity])map[row.Activity]={A:0,T:0}
    if(row.Type==="Actual")map[row.Activity].A=v
    if(row.Type==="Target")map[row.Activity].T=v
  })
  Object.entries(map).forEach(([a,v])=>{
    if(v.T>0){
      const p=Math.round(v.A/v.T*100)
      if(p<80)list.push({a,p})
    }
  })
  redList.innerHTML=""
  if(list.length===0){noRed.classList.remove("hidden");return}
  noRed.classList.add("hidden")
  list.sort((x,y)=>x.p-y.p).forEach((i,n)=>{
    redList.innerHTML+=`
    <div class="p-3 bg-red-50 border-l-4 border-red-600 rounded">
      <strong>${n+1}. ${i.a}</strong>
      <span class="float-right text-red-600 font-bold">${i.p}%</span>
    </div>`
  })
}

function updateDashboard(){
  const y=filterYear.value
  calculateKPI(y); drawChart(y); updateNarrative(y); updateRed(y)
}
</script>

</body>
</html>
