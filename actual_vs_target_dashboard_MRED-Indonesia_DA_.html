<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actual vs Target (%) Dashboard</title>

<!-- CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body { background:#f1f5f9 }
.card { background:white; border-radius:14px; padding:20px }
.kpi { cursor:pointer }
.kpi-active { outline:3px solid #000 }
</style>
</head>

<body class="p-6">

<!-- LOGIN -->
<div id="loginOverlay" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
  <div class="bg-white p-8 rounded-xl w-80 shadow">
    <h2 class="text-xl font-bold text-center mb-4">Login</h2>
    <input id="username" placeholder="Username" class="w-full border p-2 mb-3 rounded">
    <input id="password" type="password" placeholder="Password" class="w-full border p-2 mb-4 rounded">
    <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-2 rounded">Login</button>
    <p id="loginError" class="text-red-600 text-center mt-3 hidden">Login salah</p>
  </div>
</div>

<div class="max-w-7xl mx-auto space-y-6">

<h1 class="text-3xl font-bold text-center">Actual vs Target (Achievement %)</h1>

<!-- UPLOAD -->
<div class="card text-center">
  <input id="upload" type="file" class="hidden" accept=".xlsx,.xls">
  <button onclick="upload.click()" class="bg-blue-600 text-white px-4 py-2 rounded">
    Upload Excel
  </button>
  <p id="fileName" class="text-sm text-gray-600 mt-2"></p>
</div>

<!-- FILTER -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
  <div>
    <label class="font-semibold">Year</label>
    <select id="filterYear" disabled class="border p-2 w-full rounded">
      <option value="Y1">Y1</option>
      <option value="Y2">Y2</option>
      <option value="Y3">Y3</option>
    </select>
  </div>
  <div>
    <label class="font-semibold">Activity</label>
    <select id="activitySelect" disabled class="border p-2 w-full rounded">
      <option value="ALL">All</option>
    </select>
  </div>
</div>

<!-- KPI -->
<div class="grid grid-cols-3 gap-4 text-center">
  <div id="kpiGREEN" onclick="setKpiFilter('GREEN')" class="kpi bg-green-100 p-4 rounded-xl">
    <p class="text-sm">&ge; 100%</p>
    <p id="kpiGreen" class="text-2xl font-bold">0</p>
  </div>
  <div id="kpiYELLOW" onclick="setKpiFilter('YELLOW')" class="kpi bg-yellow-100 p-4 rounded-xl">
    <p class="text-sm">80–99%</p>
    <p id="kpiYellow" class="text-2xl font-bold">0</p>
  </div>
  <div id="kpiRED" onclick="setKpiFilter('RED')" class="kpi bg-red-100 p-4 rounded-xl">
    <p class="text-sm">&lt; 80%</p>
    <p id="kpiRed" class="text-2xl font-bold">0</p>
  </div>
</div>

<!-- CHART -->
<div class="card">
  <canvas id="chartMain"></canvas>
</div>

</div>

<script>
let fullData = []
let chart
let kpiFilter = "ALL"

function checkLogin(){
  if(username.value==="MREDIII" && password.value==="jayajayajaya"){
    loginOverlay.style.display="none"
  } else {
    loginError.classList.remove("hidden")
  }
}

upload.addEventListener("change", e=>{
  const file = e.target.files[0]
  fileName.textContent = file.name
  const reader = new FileReader()
  reader.onload = ()=>{
    const wb = XLSX.read(reader.result,{type:"array"})
    fullData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]])
    populateActivities()
    filterYear.disabled=false
    activitySelect.disabled=false
    updateDashboard()
  }
  reader.readAsArrayBuffer(file)
})

filterYear.addEventListener("change", resetFilter)
activitySelect.addEventListener("change", resetFilter)

function populateActivities(){
  const acts = [...new Set(fullData.map(r=>r.Activity))].sort()
  activitySelect.innerHTML = '<option value="ALL">All</option>'
  acts.forEach(a=>{
    const o = document.createElement("option")
    o.value=o.text=a
    activitySelect.add(o)
  })
}

function setKpiFilter(type){
  kpiFilter = (kpiFilter === type) ? "ALL" : type
  updateDashboard()
}

function resetFilter(){
  kpiFilter="ALL"
  updateDashboard()
}

function updateDashboard(){
  calculateKPI()
  drawChart()
}

/* ===== KPI ===== */
function calculateKPI(){
  let g=0,y=0,r=0
  const map={}

  fullData.forEach(row=>{
    if(activitySelect.value!=="ALL" && row.Activity!==activitySelect.value) return
    let a=parseFloat(row[filterYear.value])
    if(isNaN(a)) return
    if(!map[row.Activity]) map[row.Activity]={A:0,T:0}
    if(row.Type==="Actual") map[row.Activity].A=a
    if(row.Type==="Target") map[row.Activity].T=a
  })

  Object.values(map).forEach(v=>{
    if(v.T>0){
      const pct=(v.A/v.T)*100
      if(pct>=100) g++
      else if(pct>=80) y++
      else r++
    }
  })

  kpiGreen.textContent=g
  kpiYellow.textContent=y
  kpiRed.textContent=r
}

/* ===== CHART ===== */
function drawChart(){
  const labels=[], actual=[], target=[]
  const map={}

  fullData.forEach(row=>{
    if(activitySelect.value!=="ALL" && row.Activity!==activitySelect.value) return
    let v=parseFloat(row[filterYear.value])
    if(isNaN(v)) return
    if(!map[row.Activity]) map[row.Activity]={A:0,T:0}
    if(row.Type==="Actual") map[row.Activity].A=v
    if(row.Type==="Target") map[row.Activity].T=v
  })

  Object.entries(map).forEach(([act,v])=>{
    if(v.T<=0) return
    const pct=(v.A/v.T)*100

    if(kpiFilter==="GREEN" && pct<100) return
    if(kpiFilter==="YELLOW" && (pct<80 || pct>=100)) return
    if(kpiFilter==="RED" && pct>=80) return

    labels.push(act.split(":")[0])
    actual.push(pct)
    target.push(100)
  })

  chart?.destroy()
  chart=new Chart(chartMain,{
    type:"bar",
    data:{
      labels,
      datasets:[
        {label:"Target",data:target,backgroundColor:"#fca5a5"},
        {
          label:"Actual",
          data:actual,
          backgroundColor:actual.map(p=>
            p>=100?"#22c55e":p>=80?"#facc15":"#ef4444"
          )
        }
      ]
    },
    options:{
      plugins:{
        title:{display:true,text:"Achievement (%)"},
        datalabels:{
          formatter:v=>Math.round(v)+"%",
          anchor:"end",align:"top",font:{weight:"bold",size:10}
        }
      },
      scales:{
        y:{
          beginAtZero:true,
          max:200,
          ticks:{callback:v=>v+"%"},
          title:{display:true,text:"Achievement (%)"}
        }
      }
    },
    plugins:[ChartDataLabels]
  })
}
</script>

</body>
</html>
