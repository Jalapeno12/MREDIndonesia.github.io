<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Actual vs Target Dashboard</title>

<!-- Libraries -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body { background:#f1f5f9 }
.chart-box { background:white; border-radius:12px; padding:20px }
</style>
</head>

<body class="p-4">

<!-- LOGIN -->
<div id="loginOverlay" class="fixed inset-0 flex items-center justify-center bg-black/70 z-50">
  <div class="bg-white p-8 rounded-xl w-80 shadow">
    <h2 class="text-xl font-bold mb-4 text-center">Login</h2>
    <input id="username" placeholder="Username" class="w-full border p-2 mb-3 rounded"/>
    <input id="password" type="password" placeholder="Password" class="w-full border p-2 mb-4 rounded"/>
    <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
      Login
    </button>
    <p id="loginError" class="text-red-600 mt-3 text-sm hidden text-center">Login salah</p>
  </div>
</div>

<div class="max-w-7xl mx-auto space-y-6">

<!-- HEADER -->
<h1 class="text-3xl font-bold text-center">Actual vs Target Performance</h1>

<!-- UPLOAD -->
<div class="bg-white rounded-xl p-4 shadow text-center">
  <input id="upload" type="file" accept=".xlsx,.xls" class="hidden"/>
  <button onclick="document.getElementById('upload').click()"
          class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
    Upload Excel
  </button>
  <p id="fileName" class="mt-2 text-gray-600 text-sm"></p>
</div>

<!-- FILTER -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
  <div>
    <label class="font-semibold">Year</label>
    <select id="filterYear" disabled class="border p-2 w-full rounded">
      <option value="ALL">All</option>
      <option value="Y1">Y1</option>
      <option value="Y2">Y2</option>
      <option value="Y3">Y3</option>
    </select>
  </div>

  <div>
    <label class="font-semibold">Activity</label>
    <select id="activitySelect" disabled class="border p-2 w-full rounded">
      <option value="ALL">All</option>
    </select>
  </div>
</div>

<!-- KPI -->
<div class="grid grid-cols-3 gap-4 text-center">
  <div class="bg-green-100 p-3 rounded-xl">
    <p class="text-sm text-gray-600">≥100%</p>
    <p id="kpiGreen" class="text-2xl font-bold">0</p>
  </div>
  <div class="bg-yellow-100 p-3 rounded-xl">
    <p class="text-sm text-gray-600">80–99%</p>
    <p id="kpiYellow" class="text-2xl font-bold">0</p>
  </div>
  <div class="bg-red-100 p-3 rounded-xl">
    <p class="text-sm text-gray-600"><80%</p>
    <p id="kpiRed" class="text-2xl font-bold">0</p>
  </div>
</div>

<!-- CHARTS -->
<div id="charts" class="space-y-8">
  <div id="boxY1" class="chart-box">
    <canvas id="chartY1"></canvas>
  </div>
  <div id="boxY2" class="chart-box">
    <canvas id="chartY2"></canvas>
  </div>
  <div id="boxY3" class="chart-box">
    <canvas id="chartY3"></canvas>
  </div>
</div>

</div>

<script>
let fullData=[], charts={}
const years=["Y1","Y2","Y3"]

function checkLogin(){
  if(username.value==="MREDIII" && password.value==="jayajayajaya"){
    loginOverlay.style.display="none"
  } else {
    loginError.classList.remove("hidden")
  }
}

upload.addEventListener("change", e=>{
  const file=e.target.files[0]
  fileName.textContent=file.name
  const reader=new FileReader()
  reader.onload=()=>{
    const wb=XLSX.read(reader.result,{type:"array"})
    fullData=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]])
    populateActivities()
    filterYear.disabled=false
    activitySelect.disabled=false
    function updateAll() {
  const selectedYear = filterYear.value;

  if (selectedYear !== "ALL") {
    calculateKPI(selectedYear);
  } else {
    // default ALL → pakai Y1 sebagai referensi
    calculateKPI("Y1");
  }

  years.forEach(y => {
    document.getElementById("box" + y).style.display =
      selectedYear === "ALL" || selectedYear === y ? "block" : "none";

    if (selectedYear === "ALL" || selectedYear === y) {
      drawChart(y);
    }
  });
}
  }
  reader.readAsArrayBuffer(file)
})

filterYear.addEventListener("change",updateAll)
activitySelect.addEventListener("change",updateAll)

function populateActivities(){
  const acts=[...new Set(fullData.map(r=>r.Activity))].sort()
  activitySelect.innerHTML='<option value="ALL">All</option>'
  acts.forEach(a=>{
    const o=document.createElement("option")
    o.value=o.text=a
    activitySelect.add(o)
  })
}

function updateAll(){
  years.forEach(y=>{
    document.getElementById("box"+y).style.display=
      filterYear.value==="ALL"||filterYear.value===y?"block":"none"
    drawChart(y)
  })
}

function drawChart(year) {
  const filtered = {};
  let green = 0, yellow = 0, red = 0;

  // 1. Build map yang konsisten
  fullData.forEach(r => {
    if (activitySelect.value !== "ALL" && r.Activity !== activitySelect.value) return;
    let v = parseFloat(r[year]);
    if (isNaN(v)) return;

    // normalisasi persen (0–1 → 0–100)
    if (v > 0 && v <= 1) v *= 100;

    if (!filtered[r.Activity]) filtered[r.Activity] = { Actual: 0, Target: 0 };
    filtered[r.Activity][r.Type] = v;
  });

  const labels = [];
  const actual = [];
  const target = [];

  // 2. Loop per activity (AMAN)
  Object.keys(filtered).forEach(act => {
    const a = filtered[act].Actual || 0;
    const t = filtered[act].Target || 0;

    labels.push(act.split(":")[0]);
    actual.push(a);
    target.push(t);

    if (t > 0) {
      const pct = (a / t) * 100;
      if (pct >= 100) green++;
      else if (pct >= 80) yellow++;
      else red++;
    }
  });

  // 3. Update KPI (SEKARANG AKAN TERISI)
  document.getElementById("kpiGreen").innerText = green;
  document.getElementById("kpiYellow").innerText = yellow;
  document.getElementById("kpiRed").innerText = red;

  charts[year]?.destroy();

  charts[year] = new Chart(document.getElementById("chart" + year), {
    type: "bar",
    data: {
      labels,
      datasets: [
        {
          label: "Target",
          data: target,
          backgroundColor: "#fca5a5"
        },
        {
          label: "Actual",
          data: actual,
          backgroundColor: actual.map((a, i) => {
            const pct = target[i] ? (a / target[i]) * 100 : 0;
            return pct >= 100 ? "#22c55e" : pct >= 80 ? "#facc15" : "#ef4444";
          })
        }
      ]
    },
    options: {
      plugins: {
        title: { display: true, text: `${year} Performance` },
        datalabels: {
          formatter: (v, ctx) => {
            const t = target[ctx.dataIndex];
            return t ? Math.round((v / t) * 100) + "%" : "";
          },
          anchor: "end",
          align: "top",
          font: { weight: "bold", size: 10 }
        }
      },
      scales: {
        x: { ticks: { maxRotation: 30, minRotation: 30 } },
        y: { beginAtZero: true }
      }
    },
    plugins: [ChartDataLabels]
  });
}
``
  function calculateKPI(year) {
  let green = 0, yellow = 0, red = 0;
  const map = {};

  fullData.forEach(r => {
    if (activitySelect.value !== "ALL" && r.Activity !== activitySelect.value) return;
    let v = parseFloat(r[year]);
    if (isNaN(v)) return;
    if (v > 0 && v <= 1) v *= 100;

    if (!map[r.Activity]) map[r.Activity] = { A: 0, T: 0 };
    map[r.Activity][r.Type] = v;
  });

  Object.values(map).forEach(i => {
    if (i.T > 0) {
      const pct = (i.A / i.T) * 100;
      if (pct >= 100) green++;
      else if (pct >= 80) yellow++;
      else red++;
    }
  });

  document.getElementById("kpiGreen").innerText = green;
  document.getElementById("kpiYellow").innerText = yellow;
  document.getElementById("kpiRed").innerText = red;
}
</script>

</body>
</html>
