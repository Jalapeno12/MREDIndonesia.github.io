<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actual vs Target Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body { background:#f1f5f9 }
.chart-box { background:white; border-radius:14px; padding:20px }
</style>
</head>

<body class="p-4">

<!-- LOGIN -->
<div id="loginOverlay" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
  <div class="bg-white p-8 rounded-xl w-80 shadow">
    <h2 class="text-xl font-bold text-center mb-4">Login</h2>
    <input id="username" placeholder="Username" class="w-full border p-2 mb-3 rounded">
    <input id="password" type="password" placeholder="Password" class="w-full border p-2 mb-4 rounded">
    <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-2 rounded">Login</button>
    <p id="loginError" class="text-red-600 text-center mt-3 hidden">Login salah</p>
  </div>
</div>

<div class="max-w-7xl mx-auto space-y-6">

<h1 class="text-3xl font-bold text-center">Actual vs Target Performance</h1>

<!-- UPLOAD -->
<div class="bg-white p-4 rounded-xl text-center shadow">
  <input id="upload" type="file" accept=".xlsx,.xls" class="hidden">
  <button onclick="upload.click()" class="bg-blue-600 text-white px-4 py-2 rounded">
    Upload Excel
  </button>
  <p id="fileName" class="text-sm text-gray-600 mt-2"></p>
</div>

<!-- FILTER -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
  <div>
    <label class="font-semibold">Year</label>
    <select id="filterYear" disabled class="border p-2 w-full rounded">
      <option value="ALL">All</option>
      <option value="Y1">Y1</option>
      <option value="Y2">Y2</option>
      <option value="Y3">Y3</option>
    </select>
  </div>

  <div>
    <label class="font-semibold">Activity</label>
    <select id="activitySelect" disabled class="border p-2 w-full rounded">
      <option value="ALL">All</option>
    </select>
  </div>
</div>

<!-- KPI -->
<div class="grid grid-cols-3 gap-4 text-center">
  <div class="bg-green-100 p-3 rounded-xl">
    <p class="text-sm">≥100%</p>
    <p id="kpiGreen" class="text-2xl font-bold">0</p>
  </div>
  <div class="bg-yellow-100 p-3 rounded-xl">
    <p class="text-sm">80–99%</p>
    <p id="kpiYellow" class="text-2xl font-bold">0</p>
  </div>
  <div class="bg-red-100 p-3 rounded-xl">
    <p class="text-sm">&lt;80%</p>
    <p id="kpiRed" class="text-2xl font-bold">0</p>
  </div>
</div>

<!-- CHARTS -->
<div class="space-y-8">
  <div id="boxY1" class="chart-box"><canvas id="chartY1"></canvas></div>
  <div id="boxY2" class="chart-box"><canvas id="chartY2"></canvas></div>
  <div id="boxY3" class="chart-box"><canvas id="chartY3"></canvas></div>
</div>

</div>

<script>
let fullData = []
let charts = {}
const years = ["Y1","Y2","Y3"]

function checkLogin(){
  if(username.value==="MREDIII" && password.value==="jayajayajaya"){
    loginOverlay.style.display="none"
  } else {
    loginError.classList.remove("hidden")
  }
}

upload.addEventListener("change", e => {
  const file = e.target.files[0]
  fileName.innerText = file.name
  const reader = new FileReader()
  reader.onload = () => {
    const wb = XLSX.read(reader.result,{type:"array"})
    fullData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]])
    populateActivities()
    filterYear.disabled = false
    activitySelect.disabled = false
    updateAll()
  }
  reader.readAsArrayBuffer(file)
})

filterYear.addEventListener("change", updateAll)
activitySelect.addEventListener("change", updateAll)

function populateActivities(){
  const acts = [...new Set(fullData.map(r=>r.Activity))].sort()
  activitySelect.innerHTML = '<option value="ALL">All</option>'
  acts.forEach(a=>{
    const o = document.createElement("option")
    o.value = o.text = a
    activitySelect.add(o)
  })
}

/* ===== KPI KHUSUS (FIX UTAMA) ===== */
function calculateKPI(year){
  let g=0,y=0,r=0
  const map = {}

  fullData.forEach(row=>{
    if(activitySelect.value!=="ALL" && row.Activity!==activitySelect.value) return
    let v = parseFloat(row[year])
    if(isNaN(v)) return
    if(v>0 && v<=1) v*=100

    if(!map[row.Activity]) map[row.Activity] = {A:0,T:0}
    if(row.Type==="Actual") map[row.Activity].A = v
    if(row.Type==="Target") map[row.Activity].T = v
  })

  Object.values(map).forEach(i=>{
    if(i.T>0){
      const pct = i.A / i.T * 100
      if(pct>=100) g++
      else if(pct>=80) y++
      else r++
    }
  })

  kpiGreen.innerText = g
  kpiYellow.innerText = y
  kpiRed.innerText = r
}

function updateAll(){
  const selected = filterYear.value
  calculateKPI(selected==="ALL"?"Y1":selected)

  years.forEach(y=>{
    box = document.getElementById("box"+y)
    if(selected==="ALL"||selected===y){
      box.style.display="block"
      drawChart(y)
    } else {
      box.style.display="none"
    }
  })
}

function drawChart(year){
  const map={}
  fullData.forEach(r=>{
    if(activitySelect.value!=="ALL" && r.Activity!==activitySelect.value) return
    let v = parseFloat(r[year])
    if(isNaN(v)) return
    if(v>0 && v<=1) v*=100
    if(!map[r.Activity]) map[r.Activity]={A:0,T:0}
    if(r.Type==="Actual") map[r.Activity].A=v
    if(r.Type==="Target") map[r.Activity].T=v
  })

  const labels=[], actual=[], target=[]
  Object.entries(map).forEach(([k,v])=>{
    labels.push(k.split(":")[0])
    actual.push(v.A)
    target.push(v.T)
  })

  charts[year]?.destroy()

  charts[year] = new Chart(document.getElementById("chart"+year),{
    type:"bar",
    data:{
      labels,
      datasets:[
        { label:"Target", data:target, backgroundColor:"#fca5a5"},
        { label:"Actual",
          data:actual,
          backgroundColor:actual.map((a,i)=>{
            const p = target[i]?a/target[i]*100:0
            return p>=100?"#22c55e":p>=80?"#facc15":"#ef4444"
          })
        }
      ]
    },
    options:{
      plugins:{
        title:{display:true,text:`${year} Performance`},
        datalabels:{
          formatter:(v,i)=>target[i.dataIndex]?Math.round(v/target[i.dataIndex]*100)+"%":"",
          anchor:"end", align:"top", font:{weight:"bold",size:10}
        }
      },
      scales:{ y:{beginAtZero:true} }
    },
    plugins:[ChartDataLabels]
  })
}
</script>

</body>
</html>
``
